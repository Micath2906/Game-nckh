<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liar's Theory - Game Thách Thức Lý Thuyết</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border: none;
            background: transparent;
            font-size: 1.1em;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Setup Section */
        .setup-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .questions-list {
            margin-top: 30px;
        }

        .question-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .question-item.false {
            border-left-color: #dc3545;
        }

        .question-text {
            flex: 1;
            margin-right: 15px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-right: 10px;
        }

        .badge-true {
            background: #28a745;
            color: white;
        }

        .badge-false {
            background: #dc3545;
            color: white;
        }

        /* Game Section */
        .game-board {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .players-panel,
        .gun-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .player-card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            transition: all 0.3s;
        }

        .player-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            transform: scale(1.05);
        }

        .player-card.eliminated {
            opacity: 0.5;
            border-color: #dc3545;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .player-hints {
            font-size: 0.9em;
            color: #666;
        }

        .theory-card {
            background: linear-gradient(135deg, #fff5cd 0%, #ffeaa7 100%);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .theory-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .gun-chamber {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .bullet {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s;
        }

        .bullet.used {
            background: #6c757d;
            opacity: 0.3;
        }

        .bullet.live {
            background: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .challenge-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .challenge-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .timer {
            font-size: 3em;
            font-weight: bold;
            color: #dc3545;
            margin: 20px 0;
        }

        .hint-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #2196F3;
        }

        .game-log {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid #667eea;
            padding-left: 12px;
        }

        .log-entry.danger {
            border-left-color: #dc3545;
        }

        .log-entry.success {
            border-left-color: #28a745;
        }

        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Liar's Theory Game</h1>
            <p>Trò chơi thách thức lý thuyết - Kết hợp Liar's Bar và Russian Roulette</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('setup')">📝 Thiết Lập</button>
            <button class="tab" onclick="switchTab('game')">🎮 Chơi Game</button>
        </div>

        <div class="content">
            <!-- Setup Section -->
            <div id="setup" class="section active">
                <div class="setup-form">
                    <h2 style="margin-bottom: 30px; text-align: center;">Quản Lý Câu Hỏi Lý Thuyết</h2>
                    
                    <div class="form-group">
                        <label>Câu phát biểu lý thuyết:</label>
                        <textarea id="questionText" placeholder="Nhập câu phát biểu (VD: Tia X có khả năng đâm xuyên qua chì)"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Đáp án:</label>
                        <select id="questionAnswer">
                            <option value="true">✅ Đúng</option>
                            <option value="false">❌ Sai</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Giải thích/Gợi ý (tùy chọn):</label>
                        <textarea id="questionHint" placeholder="VD: Tia X có năng lượng cao, có thể xuyên qua nhiều vật liệu"></textarea>
                    </div>

                    <div style="text-align: center;">
                        <button class="btn btn-primary" onclick="addQuestion()">➕ Thêm Câu Hỏi</button>
                        <button class="btn btn-warning" onclick="clearAllQuestions()">🗑️ Xóa Tất Cả</button>
                    </div>

                    <div class="questions-list" id="questionsList"></div>

                    <hr style="margin: 40px 0;">

                    <h2 style="margin-bottom: 20px; text-align: center;">Cài Đặt Game</h2>
                    
                    <div class="form-group">
                        <label>Số lượng người chơi:</label>
                        <input type="number" id="playerCount" value="3" min="2" max="6">
                    </div>

                    <div class="form-group">
                        <label>Nhập tên người chơi (mỗi người một dòng):</label>
                        <textarea id="playerNames" placeholder="Người chơi 1&#10;Người chơi 2&#10;Người chơi 3">Người chơi 1
Người chơi 2
Người chơi 3</textarea>
                    </div>

                    <div style="text-align: center; margin-top: 30px;">
                        <button class="btn btn-success" onclick="startGame()" style="font-size: 1.2em; padding: 15px 40px;">
                            🎮 BẮT ĐẦU GAME
                        </button>
                    </div>
                </div>
            </div>

            <!-- Game Section -->
            <div id="game" class="section">
                <div class="game-board">
                    <!-- Players Panel -->
                    <div class="players-panel">
                        <h3 style="margin-bottom: 15px;">👥 Người Chơi</h3>
                        <div id="playersList"></div>
                    </div>

                    <!-- Main Game Area -->
                    <div>
                        <div class="theory-card">
                            <div class="theory-text" id="theoryText">
                                Nhấn "Rút Thẻ" để bắt đầu!
                            </div>
                            <div class="game-actions">
                                <button class="btn btn-primary" onclick="drawCard()" id="drawBtn">
                                    🎴 Rút Thẻ Lý Thuyết
                                </button>
                                <button class="btn btn-danger" onclick="challengeTheory()" id="challengeBtn" style="display:none;">
                                    ⚠️ SAI RỒI! (Bắt Bài)
                                </button>
                                <button class="btn btn-success" onclick="acceptTheory()" id="acceptBtn" style="display:none;">
                                    ✅ Chấp Nhận
                                </button>
                            </div>
                        </div>

                        <div class="game-log" id="gameLog"></div>
                    </div>

                    <!-- Gun Panel -->
                    <div class="gun-panel">
                        <h3 style="margin-bottom: 15px;">🔫 Ổ Đạn</h3>
                        <div class="gun-chamber" id="gunChamber"></div>
                        <div style="text-align: center; margin-top: 20px;">
                            <p style="font-weight: bold;">Đạn còn lại: <span id="bulletsLeft">6</span></p>
                        </div>
                        <div class="hint-box" id="hintBox" style="display:none;">
                            <strong>💡 Gợi ý:</strong>
                            <p id="hintText"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Challenge Modal -->
    <div class="challenge-modal" id="challengeModal">
        <div class="modal-content">
            <h2 id="modalTitle">⚠️ Thách Thức!</h2>
            <p id="modalText">Giải thích tại sao câu này sai và sửa lại cho đúng:</p>
            <textarea id="challengeExplanation" style="width: 100%; min-height: 100px; padding: 10px; margin: 20px 0; border-radius: 8px; border: 2px solid #dee2e6;"></textarea>
            <div>
                <button class="btn btn-success" onclick="submitChallenge()">Xác Nhận</button>
                <button class="btn btn-danger" onclick="cancelChallenge()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
